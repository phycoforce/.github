---
# Org-wide defaults applied to every repo by .github/workflows/safe-settings.yaml.
# Per-repo overrides live in .github/safe-settings/repos/<repo-name>.yml.
# Schema: https://github.com/github/safe-settings/blob/main/docs/sample-settings/settings.yml
#
# Labels-only by intent. The `repository:` plugin in safe-settings 2.1.x
# has a race condition: updateRepos() mutates `this.config.repository`
# in place while eachRepositoryRepos processes repos via Promise.all, so
# parallel iterations clobber each other's `name`/`org` fields. Until
# upstream fixes it, manage repo-level settings (default_branch, merge
# modes, features, …) through org policy or by hand.

labels:
  exclude:
    # Dynamic managed
    - name: ^app/
    # Labeler managed
    - name: ^area/
    # Release Please managed
    - name: "autorelease: pending"
    - name: "autorelease: tagged"
    - name: release-please:force-run

  include:
    # Issue classification
    - name: bug
      color: d73a4a
      description: Something isn't working
    - name: documentation
      color: 0075ca
      description: Improvements or additions to documentation
    - name: enhancement
      color: a2eeef
      description: New feature or request
    - name: question
      color: d876e3
      description: Further information is requested
    - name: wontfix
      color: ffffff
      description: This will not be worked on
    - name: do-not-merge
      color: ee0701
      description: Marks PR that is not (yet) in a mergeable state
    - name: stale
      color: c5def5
      description: Marked stale by automation due to inactivity

    # Semantic version types
    - name: type/digest
      color: ffec19
      description: Issue relates to a digest version bump
    - name: type/patch
      color: ffec19
      description: Issue relates to a patch version bump
    - name: type/minor
      color: ff9800
      description: Issue relates to a minor version bump
    - name: type/major
      color: f6412d
      description: Issue relates to a major version bump

    # Renovate manager types
    - name: renovate/container
      color: 027fa0
      description: Pull request updates a container image
    - name: renovate/github-action
      color: 027fa0
      description: Pull request updates a GitHub Action
    - name: renovate/github-release
      color: 027fa0
      description: Pull request updates a GitHub release
    - name: renovate/helm
      color: 027fa0
      description: Pull request updates a Helm chart
